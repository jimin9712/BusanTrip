function Slider({imgs}) {
  const [idx, setIdx] = useState(0);
  const total = imgs.length;
  const prev = (e) => { e.stopPropagation(); setIdx(i => (i - 1 + total) % total); };
  const next = (e) => { e.stopPropagation(); setIdx(i => (i + 1) % total); };
  return (
    <div style={{position:'relative',height:'170px',background:'#111',overflow:'hidden'}}>
      <img src={imgs[idx]} alt="" style={{width:'100%',height:'100%',objectFit:'cover',objectPosition:'center',transition:'opacity .2s'}}/>
      {total > 1 && <>
        <button onClick={prev} style={{position:'absolute',left:'6px',top:'50%',transform:'translateY(-50%)',background:'rgba(0,0,0,.55)',border:'none',borderRadius:'50%',width:'28px',height:'28px',color:'#fff',fontSize:'13px',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',lineHeight:1}}>‹</button>
        <button onClick={next} style={{position:'absolute',right:'6px',top:'50%',transform:'translateY(-50%)',background:'rgba(0,0,0,.55)',border:'none',borderRadius:'50%',width:'28px',height:'28px',color:'#fff',fontSize:'13px',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',lineHeight:1}}>›</button>
        <div style={{position:'absolute',bottom:'6px',left:'50%',transform:'translateX(-50%)',display:'flex',gap:'4px'}}>
          {imgs.map((_,i) => (
            <div key={i} onClick={e=>{e.stopPropagation();setIdx(i);}}
              style={{width:'5px',height:'5px',borderRadius:'50%',background:i===idx?'#C8A96E':'rgba(255,255,255,.4)',cursor:'pointer',transition:'background .2s'}}/>
          ))}
        </div>
      </>}
    </div>
  );
}

function Popup({onClose}) {
  const noRef = useRef(null);
  const boxRef = useRef(null);
  const [selected, setSelected] = useState(null);

  useEffect(() => {
    const btn = noRef.current;
    if (!btn) return;
    btn.style.width = btn.offsetWidth + 'px';
    btn.style.height = btn.offsetHeight + 'px';
    function run() {
      const box = boxRef.current;
      if (!box) return;
      const bw = btn.offsetWidth, bh = btn.offsetHeight, pad = 16;
      const maxX = box.offsetWidth - bw - pad;
      const maxY = box.offsetHeight - bh - pad;
      btn.style.left = (pad + Math.random() * Math.max(0, maxX - pad)) + 'px';
      btn.style.top  = (pad + Math.random() * Math.max(0, maxY - pad)) + 'px';
      btn.style.right = 'auto';
    }
    btn.addEventListener('mouseenter', run);
    btn.addEventListener('touchstart', run, {passive: true});
    return () => {
      btn.removeEventListener('mouseenter', run);
      btn.removeEventListener('touchstart', run);
    };
  }, []);

  const rooms = [
    {
      key: 'std',
      name: '매화 스탠다드 더블',
      price: '290,000원',
      original: '350,000원',
      discount: '17%',
      bed: '퀸 침대 1개',
      tag: '매화동 (8번지)',
      desc: '다다미 · 빔프로젝터 · OTT',
    },
    {
      key: 'sup',
      name: '매화 수페리어 더블',
      price: '299,000원',
      original: '360,000원',
      discount: '16%',
      bed: '퀸 침대 1개',
      tag: '매화동 (8번지)',
      desc: '욕조 · 유리창 욕실 · OTT',
    },
    {
      key: 'dlx',
      name: '코스모스 수페리어 디럭스 더블',
      price: '353,000원',
      original: '420,000원',
      discount: '15%',
      bed: '퀸 침대 1개',
      tag: '코스모스동 (7번지)',
      desc: '거실형 욕조 · 다다미 좌식 · OTT',
    },
  ];

  const selectedRoom = rooms.find(r => r.key === selected);

  return (
    <div id="popup" style={{position:'fixed',inset:0,zIndex:9999,background:'rgba(13,13,13,.97)',backdropFilter:'blur(16px)',display:'flex',alignItems:'center',justifyContent:'center',padding:'1rem'}}>
      <div ref={boxRef} id="popup-box" style={{background:'#161616',border:'1px solid #2A2A2A',borderRadius:'1.25rem',width:'900px',maxWidth:'97vw',position:'relative',overflow:'hidden',padding:'2rem'}}>
        <div style={{position:'absolute',inset:0,background:'radial-gradient(ellipse 60% 40% at 50% 0%,rgba(200,169,110,.06) 0%,transparent 70%)',pointerEvents:'none'}}/>
        <div style={{position:'relative'}}>
          <p style={{fontSize:'.68rem',letterSpacing:'.18em',textTransform:'uppercase',color:'#C8A96E',marginBottom:'.4rem',textAlign:'center'}}>아늑 리조트 앤 스파 · 해운대</p>
          <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:'1.25rem',fontWeight:700,color:'#F5F0E8',marginBottom:'1.25rem',textAlign:'center'}}>객실 선택</h2>

          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'1rem',marginBottom:'1.25rem'}}>
            {rooms.map(r => (
              <div key={r.key} onClick={() => setSelected(r.key)}
                style={{borderRadius:'10px',overflow:'hidden',cursor:'pointer',
                  border: selected === r.key ? '2px solid #C8A96E' : '2px solid rgba(255,255,255,.08)',
                  boxShadow: selected === r.key ? '0 0 0 1px rgba(200,169,110,.2),0 8px 24px rgba(200,169,110,.12)' : 'none',
                  transition:'border-color .2s,box-shadow .2s'}}>
                <div style={{position:'relative'}}>
                  <Slider imgs={ROOM_IMGS[r.key]}/>
                  <div style={{position:'absolute',top:'8px',left:'8px',background:'rgba(13,13,13,.75)',backdropFilter:'blur(6px)',borderRadius:'99px',padding:'3px 10px',fontSize:'.62rem',color:'#C8A96E',fontWeight:600,letterSpacing:'.05em',zIndex:2}}>{r.tag}</div>
                  <div style={{position:'absolute',top:'8px',right:'8px',background:'#C8A96E',borderRadius:'99px',padding:'3px 8px',fontSize:'.62rem',color:'#0D0D0D',fontWeight:700,zIndex:2}}>{r.discount} OFF</div>
                  {selected === r.key && (
                    <div style={{position:'absolute',top:'8px',right:'50px',zIndex:2}}>
                      <div style={{width:'22px',height:'22px',borderRadius:'50%',background:'#C8A96E',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'.75rem',color:'#0D0D0D',fontWeight:700}}>✓</div>
                    </div>
                  )}
                </div>
                <div style={{padding:'.8rem',background:'#1C1C1C'}}>
                  <p style={{fontSize:'.8rem',fontWeight:600,color:'#F5F0E8',marginBottom:'.3rem',lineHeight:1.35}}>{r.name}</p>
                  <p style={{fontSize:'.7rem',color:'#8A8278',marginBottom:'.4rem'}}>{r.bed} · 체크인 15:00 · 체크아웃 11:00</p>
                  <p style={{fontSize:'.68rem',color:'#8A8278',marginBottom:'.5rem'}}>{r.desc}</p>
                  <div style={{display:'flex',alignItems:'baseline',gap:'.35rem'}}>
                    <span style={{fontSize:'1rem',fontWeight:700,color:'#C8A96E'}}>{r.price}</span>
                    <span style={{fontSize:'.68rem',color:'#8A8278',textDecoration:'line-through'}}>{r.original}</span>
                  </div>
                </div>
              </div>
            ))}
          </div>

          <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:'.75rem',position:'relative',minHeight:'2.6rem'}}>
            <button onClick={() => { if(selected){ onClose(); } }}
              style={{background: selected ? '#C8A96E' : 'rgba(255,255,255,.07)',
                color: selected ? '#0D0D0D' : 'rgba(255,255,255,.2)',
                border:'none',borderRadius:'99px',padding:'.65rem 2rem',
                fontWeight:600,fontSize:'.88rem',
                cursor: selected ? 'pointer' : 'default',
                fontFamily:"'Inter',sans-serif",
                transition:'all .2s'}}>
              {selected ? `${selectedRoom.name.split(' ')[0]} 선택 완료` : '객실을 먼저 선택해주세요'}
            </button>
            <button ref={noRef} id="btn-no"
              style={{position:'absolute',right:0,background:'rgba(255,255,255,.05)',border:'1px solid rgba(255,255,255,.08)',color:'rgba(255,255,255,.22)',borderRadius:'99px',padding:'.45rem 1.1rem',fontSize:'.78rem',cursor:'pointer',whiteSpace:'nowrap',fontFamily:"'Inter',sans-serif"}}>
              아니오
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

              {item.cost&&<span style={{display:'inline-block',marginTop:'.35rem',fontSize:'.72rem',color:'#C8A96E',background:'rgba(200,169,110,.08)',border:'1px solid rgba(200,169,110,.15)',padding:'.15rem .55rem',borderRadius:'99px'}}>{item.cost}</span>}
            </div>
          )}
        </div>
      </div>

      {/* 모바일 */}
      <div className="flex md:hidden gap-3 mb-4">
        <div style={{flexShrink:0,paddingTop:'4px'}}>
          <div style={{width:'8px',height:'8px',borderRadius:'50%',background:accent}}/>
        </div>
        <div className="spot-card flex-1" style={{background:'#1C1C1C',border:'1px solid rgba(255,255,255,.06)',borderRadius:'10px',padding:'.85rem'}}>
          <div style={{display:'flex',alignItems:'center',gap:'.35rem',marginBottom:'.25rem'}}>
            <span style={{fontSize:'.95rem'}}>{item.e}</span>
            <span style={{fontSize:'.68rem',fontWeight:600,letterSpacing:'.08em',color:accent}}>{item.time}</span>
          </div>
          <p style={{fontSize:'.85rem',fontWeight:500,color:'#F5F0E8',marginBottom:'.2rem'}}>{item.w}</p>
          <p style={{fontSize:'.73rem',color:'#8A8278',lineHeight:1.5}}>{item.p}</p>
          {item.cost&&<span style={{display:'inline-block',marginTop:'.3rem',fontSize:'.7rem',color:'#C8A96E',background:'rgba(200,169,110,.08)',border:'1px solid rgba(200,169,110,.15)',padding:'.12rem .5rem',borderRadius:'99px'}}>{item.cost}</span>}
        </div>
      </div>
    </>
  );
}
