          <p style={{fontSize:'.7rem',letterSpacing:'.2em',textTransform:'uppercase',color:'#8A8278',marginBottom:'.6rem',textAlign:'center'}}>Before You Go</p>
          <h2 style={{fontFamily:'Playfair Display,serif',fontSize:'clamp(1.8rem,4vw,2.8rem)',fontWeight:700,textAlign:'center',marginBottom:'.6rem',color:'#F5F0E8'}}>출발 전 체크리스트</h2>
          <p style={{fontSize:'.88rem',textAlign:'center',marginBottom:'2.5rem',color:'rgba(245,240,232,.35)'}}>출발 전 확인 사항</p>

          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(240px,1fr))',gap:'1rem',marginBottom:'1.5rem'}}>
            {CHECKS.map((c,i)=>(
              <div key={i} className="spot-card" style={{background:'#1C1C1C',border:`1px solid ${c.u?'rgba(200,169,110,.22)':'rgba(255,255,255,.06)'}`,borderRadius:'14px',padding:'1.25rem'}}>
                {c.u&&<p style={{fontSize:'.65rem',fontWeight:700,letterSpacing:'.12em',textTransform:'uppercase',color:'#C8A96E',marginBottom:'.6rem'}}>긴급 예약 필요</p>}
                <div style={{fontSize:'1.6rem',marginBottom:'.6rem'}}>{c.e}</div>
                <h4 style={{fontSize:'.9rem',fontWeight:600,color:'#F5F0E8',marginBottom:'.35rem'}}>{c.t}</h4>
                <p style={{fontSize:'.78rem',color:'#8A8278',lineHeight:1.6}}>{c.d}</p>
              </div>
            ))}
          </div>

          {/* 이재모 경고 */}
          <div style={{background:'rgba(200,169,110,.05)',border:'1px solid rgba(200,169,110,.18)',borderRadius:'14px',padding:'1.1rem 1.3rem',display:'flex',gap:'.8rem',alignItems:'flex-start'}}>
            <span style={{fontSize:'1.2rem',flexShrink:0}}>⚠️</span>
            <div>
              <p style={{fontSize:'.88rem',fontWeight:600,color:'#C8A96E',marginBottom:'.3rem'}}>이재모피자 — 일요일 전 지점 휴무</p>
              <p style={{fontSize:'.78rem',color:'rgba(245,240,232,.45)',lineHeight:1.65}}>
                대표가 독실한 크리스천이라 일요일은 전 지점 문 닫아요. 7/19(일) 방문 불가 → 세 안 모두 <strong style={{color:'rgba(245,240,232,.75)'}}>토요일(7/18) 오후에 배치</strong>했어요.
              </p>
            </div>
          </div>
        </div>
      </section>

      {/* FOOTER */}
      <footer style={{textAlign:'center',padding:'3rem 1rem',borderTop:'1px solid rgba(255,255,255,.06)'}}>
        <p style={{fontFamily:'Playfair Display,serif',fontSize:'1.2rem',color:'#C8A96E',marginBottom:'.75rem'}}>부산 2박 3일</p>
        <p style={{fontSize:'.75rem',color:'rgba(245,240,232,.2)',lineHeight:2}}>
          7/17 — 7/19 · 송정 올라 호텔 · 해운대 아늑 리조트 앤 스파<br/>
          블루라인파크 스카이캡슐 · 이재모피자 · 양곱창 · 요트 · 드론쇼
        </p>
      </footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
